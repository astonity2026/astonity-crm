<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Astonity CRM Real</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@500;700;900&display=swap');
*{box-sizing:border-box}
:root{--bg:#050816;--line:rgba(79,142,247,.22);--cyan:#00d4ff;--orange:#ff8c00;--text:#e5f4ff;--muted:rgba(229,244,255,.58)}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:'Arame','Michroma','Orbitron',sans-serif;overflow-x:hidden;-webkit-text-size-adjust:100%}
body{padding-bottom:86px;background:radial-gradient(circle at 20% -5%,rgba(0,212,255,.12),transparent 30%),#050816}
button,input,select,textarea,a{font:inherit} button{cursor:pointer}
.top{position:sticky;top:0;z-index:10;background:rgba(5,8,22,.96);border-bottom:1px solid var(--line);padding:8px 10px 8px;backdrop-filter:blur(14px)}
.eyebrow{font-size:7px;letter-spacing:1.8px;color:var(--cyan);opacity:.78;line-height:1.2}
.title{display:grid;grid-template-columns:1fr 110px;gap:8px;align-items:start;margin-top:6px}
h1{margin:0;font-size:20px;line-height:.95;letter-spacing:.5px} .blue{display:block;color:var(--cyan);text-shadow:0 0 12px rgba(0,212,255,.45)}
.headerRight{min-width:110px;text-align:right} .small{font-size:8px;line-height:1.15;color:var(--muted)}
.syncBtn{margin-top:4px;width:100%;min-height:28px;padding:5px 6px;font-size:7.5px;border-radius:8px;border:1px solid rgba(255,140,0,.45);background:rgba(255,140,0,.08);color:var(--orange);font-weight:1000}
.syncBtn.syncing{opacity:.65;pointer-events:none} .syncBtn.good{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.09);color:#22c55e}
.sync{font-size:7px;line-height:1.2;margin-top:3px;color:var(--orange)}
.wrap{padding:8px 8px 14px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.stat{border:1px solid var(--line);background:rgba(229,244,255,.045);border-radius:11px;padding:8px 8px}
.stat strong{display:block;color:var(--cyan);font-size:16px;line-height:1} .stat span{font-size:6.5px;color:var(--muted)}
.filters{display:grid;gap:6px;margin-bottom:8px}
input,select,textarea{width:100%;border:1px solid rgba(79,142,247,.28);background:#06101f;color:var(--text);border-radius:10px;padding:10px 9px;outline:none}
#search{min-height:34px;font-size:11px} .filterRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px} .filterRow select{min-height:34px;padding:7px 8px;font-size:8px}
.section{margin:10px 0 7px;font-size:9px;letter-spacing:1.4px;color:var(--cyan);font-weight:900}
.leadList{display:grid;gap:6px}
.leadCard{position:relative;padding:8px 8px 7px;border-radius:14px;background:linear-gradient(135deg,rgba(15,34,56,.82),rgba(6,15,28,.92));border:1px solid rgba(58,123,184,.30);border-left-width:4px;box-shadow:inset 0 0 0 1px rgba(0,212,255,.05),0 8px 18px rgba(0,0,0,.18);overflow:hidden}
.leadCard::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:0 999px 999px 0;background:var(--lead-glow,#00d4ff)}
.leadTop{display:grid;grid-template-columns:30px minmax(0,1fr);gap:8px;align-items:start}
.avatar{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:10px;font-weight:1000;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.40)}
.identity{padding-right:120px} .handle{font-size:11px;font-weight:1000;line-height:1.05} .business{font-size:9px;line-height:1.15;margin-top:2px;color:rgba(229,244,255,.68)}
.contactIcons{display:flex;gap:6px;margin-top:5px}
.contactIcon{width:38px;height:22px;border-radius:7px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.24);display:flex;align-items:center;justify-content:center;color:var(--cyan);text-decoration:none}
.contactIcon svg{width:12px;height:12px;stroke:var(--cyan)} .contactIcon.disabled{opacity:.3;pointer-events:none}
.igActions{position:absolute;top:8px;right:8px;display:flex;gap:6px;align-items:center}
.miniBtn,.openBtn,.primary{display:flex;align-items:center;justify-content:center;width:56px;min-width:56px;height:24px;min-height:24px;padding:4px 4px;border-radius:9px;font-size:7px;border:1px solid rgba(0,212,255,.34);background:rgba(0,212,255,.07);color:var(--cyan);text-decoration:none;font-weight:1000}
.primary{width:100%;min-width:0;height:34px;min-height:34px;font-size:9px}
.divider{height:1px;background:rgba(79,142,247,.16);margin:6px 0 7px}
.controlRow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;margin-bottom:6px}
.inline{display:flex;gap:6px}
.pill,.statusSelect,.prioritySelect{width:86px;min-width:86px;max-width:86px;height:27px;min-height:27px;padding:4px 7px;font-size:7.5px;border-radius:999px;background:rgba(5,11,22,.95)}
.statusSelect[data-v="NEW LEAD"],.prioritySelect[data-v="NEW LEAD"]{color:#00d4ff;border-color:rgba(0,212,255,.65)}
.statusSelect[data-v="FIRST DM"]{color:#38bdf8;border-color:rgba(56,189,248,.65)}
.statusSelect[data-v="FOLLOW UP 1"],.statusSelect[data-v="FOLLOW UP 2"],.prioritySelect[data-v="MEDIUM"]{color:#facc15;border-color:rgba(250,204,21,.65)}
.statusSelect[data-v="REPLIED"],.statusSelect[data-v="CLOSED"],.prioritySelect[data-v="HIGH"]{color:#22c55e;border-color:rgba(34,197,94,.65)}
.statusSelect[data-v="ENGAGED"]{color:#a78bfa;border-color:rgba(167,139,250,.65)}
.statusSelect[data-v="NOT INTERESTED"],.prioritySelect[data-v="LOW"]{color:#ef4444;border-color:rgba(239,68,68,.65)}
.statusSelect[data-v="DEAD"],.prioritySelect[data-v="DEAD"]{color:#94a3b8;border-color:rgba(54,69,79,.85)}
.lastContact{font-size:8px;gap:7px;white-space:nowrap;display:flex} .nextDate{color:var(--orange)}
.notesWrap{padding:7px;border-radius:10px;background:rgba(0,13,26,.42);border:1px solid rgba(0,212,255,.18)} .notesWrap.emptyNote{display:none}
.notesHeader{display:flex;justify-content:space-between;font-size:8px;margin-bottom:5px;color:rgba(229,244,255,.48);font-weight:1000}
.editNoteBtn{background:transparent;border:0;color:var(--cyan);font-size:8px;font-weight:1000} .notes{min-height:40px;font-size:9px;line-height:1.3;border:0;background:transparent;padding:0}
.showNotesBtn{width:100%;height:26px;min-height:26px;border-radius:8px;font-size:8px;margin-top:5px;border:1px solid rgba(0,212,255,.24);background:rgba(0,212,255,.06);color:var(--cyan)}
.hidden{display:none!important}
.page{display:none} .page.active{display:block}
.card{border:1px solid var(--line);background:rgba(229,244,255,.045);border-radius:14px;padding:12px;margin-bottom:10px}
.importHint{font-size:10px;color:var(--muted);line-height:1.5;margin:0 0 8px}
#importFile{margin-bottom:8px;min-height:40px} #importInput{min-height:150px;font-size:10px}
.importSummary{color:var(--orange);font-size:10px;font-weight:1000;margin-top:8px}
.importPreviewCard{border:1px solid var(--line);background:rgba(0,13,26,.42);border-radius:12px;padding:9px;margin-bottom:7px} .importPreviewCard strong{font-size:11px} .importPreviewCard span{display:block;color:var(--muted);font-size:10px;margin-top:3px}
.importBad{border-left:4px solid #ef4444} .importGood{border-left:4px solid var(--cyan)} .importActions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.bottomNavSimple{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(5,8,22,.97);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:8px 12px calc(10px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
.bottomNavSimple .nav{min-height:40px;border-radius:12px;font-size:9px;background:transparent;color:rgba(229,244,255,.42);border:0;font-weight:1000} .bottomNavSimple .nav.active{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.22)}
.bottomNavSimple .navPlus{width:54px;min-width:54px;height:54px;min-height:54px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:28px;line-height:1;font-weight:700;background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.32);box-shadow:0 0 0 1px rgba(0,212,255,.08) inset}
.bottomNavSimple .navPlus.active{background:rgba(0,212,255,.18)}
.empty{padding:28px 12px;color:rgba(229,244,255,.45);text-align:center;font-size:12px}

/* EXPANDABLE LEAD DETAILS */
.avatar{
  cursor:pointer!important;
  touch-action:manipulation!important;
  position:relative!important;
}
.avatar::after{
  content:"";
  position:absolute;
  inset:-10px;
}
.expanded{
  display:none;
  margin-top:7px!important;
  border-radius:10px!important;
  padding:8px!important;
  border:1px solid rgba(0,212,255,.18)!important;
  background:rgba(0,13,26,.46)!important;
}
.leadCard.open .expanded{
  display:block!important;
}
.expandedTitle{
  color:#00d4ff!important;
  font-size:9px!important;
  font-weight:1000!important;
  letter-spacing:1px!important;
  margin-bottom:8px!important;
}
.expandedGrid{
  display:grid!important;
  grid-template-columns:1fr!important;
  gap:7px!important;
}
.expandedField label{
  display:block!important;
  font-size:8px!important;
  color:rgba(229,244,255,.45)!important;
  font-weight:1000!important;
  margin-bottom:3px!important;
}
.expandedField input,
.expandedField select,
.expandedField textarea{
  width:100%!important;
  min-height:36px!important;
  font-size:9px!important;
  border:1px solid rgba(79,142,247,.28)!important;
  background:#06101f!important;
  color:#e5f4ff!important;
  border-radius:10px!important;
  padding:9px 8px!important;
}
.expandedField textarea{
  min-height:64px!important;
}
.collapse{
  margin-top:8px!important;
  width:100%!important;
  min-height:30px!important;
  border-radius:8px!important;
  font-size:8px!important;
  border:1px solid rgba(0,212,255,.24)!important;
  background:rgba(0,212,255,.06)!important;
  color:#00d4ff!important;
}


/* STATUS/PRIORITY SIZE FIX */
.pill,.statusSelect,.prioritySelect{
  width:116px!important;
  min-width:116px!important;
  max-width:116px!important;
  height:30px!important;
  min-height:30px!important;
  padding:4px 18px 4px 8px!important;
  font-size:7px!important;
  line-height:1.1!important;
  white-space:nowrap!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
}
.controlRow{
  grid-template-columns:1fr!important;
  gap:6px!important;
}
.lastContact{
  justify-content:space-between!important;
}
.bottomNavSimple{
  grid-template-columns:1fr auto!important;
}


/* COLLAPSIBLE IMPORT INSIDE PLUS PAGE */
.importToggleBtn{
  width:100%!important;
  min-height:36px!important;
  border-radius:10px!important;
  border:1px solid rgba(0,212,255,.34)!important;
  background:rgba(0,212,255,.07)!important;
  color:#00d4ff!important;
  font-size:9px!important;
  font-weight:1000!important;
  letter-spacing:.3px!important;
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  margin-bottom:10px!important;
}
.importPanel{display:none;}
.importPanel.open{display:block;}

/* STATUS / PRIORITY SIZE TWEAK */
.pill,.statusSelect,.prioritySelect{
  width:104px!important;
  min-width:104px!important;
  max-width:104px!important;
  font-size:7px!important;
  padding:4px 18px 4px 7px!important;
  text-overflow:ellipsis!important;
  white-space:nowrap!important;
  overflow:hidden!important;
}

</style>
</head>
<body>
<div id="toast" style="display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:99;border:1px solid rgba(0,212,255,.42);background:#071629;color:#00d4ff;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:1000"></div>
<header class="top">
  <div class="eyebrow">SYSTEM ONLINE · FIREBASE FIRESTORE</div>
  <div class="title">
    <h1>ASTONITY <span class="blue">CRM</span></h1>
    <div class="headerRight">
      <div class="small"><span id="count">0</span> leads tracked</div>
      <button id="syncBtn" class="syncBtn">Sync to Cloud</button>
      <div id="syncText" class="sync">Loading...</div>
      <div class="sync" style="color:rgba(229,244,255,.45)">Realtime sync across devices</div>
    </div>
  </div>
</header>
<main class="wrap">
  <section id="leads" class="page active">
    <div class="stats">
      <div class="stat"><strong id="total">0</strong><span>Total</span></div>
      <div class="stat"><strong id="high">0</strong><span>High</span></div>
      <div class="stat"><strong id="replied">0</strong><span>Replied</span></div>
      <div class="stat"><strong id="active">0</strong><span>Active</span></div>
    </div>
    <div class="filters">
      <input id="search" placeholder="Search handle, business, niche, notes...">
      <div class="filterRow">
        <select id="fStatus"></select>
        <select id="fPriority"></select>
        <select id="fCategory"></select>
      </div>
    </div>
    <div class="section">LEAD REGISTRY · <span id="visible">0</span> RECORDS</div>
    <div id="leadList" class="leadList"><div class="empty">Loading Google Sheet leads...</div></div>
  </section>
  <section id="add" class="page">
    <div class="section">ADD NEW LEAD</div>
    <button id="importToggleBtn" class="importToggleBtn">IMPORT LEADS</button>
    <div id="importPanel" class="card importPanel">
      <p class="importHint">Upload CSV or paste rows. Excel button is shown for UI flow. CSV/text import works now.</p>
      <input id="importFile" type="file" accept=".csv,.txt,.tsv,.xlsx,.xls">
      <textarea id="importInput" placeholder="Business Name, IG Handle, Category, Phone, Email, Notes"></textarea><br><br>
      <button id="parseImportBtn" class="primary">PREVIEW IMPORT</button><br><br>
      <button id="importFileBtn" class="primary">IMPORT FILE</button>
      <div id="importSummary" class="importSummary"></div>
      <div id="importPreview"></div>
    </div>
    <div class="card">
      <input id="aBusiness" placeholder="Business name"><br><br>
      <input id="aHandle" placeholder="@instagramhandle"><br><br>
      <select id="aCategory"></select><br><br>
      <input id="aPhone" placeholder="Phone optional"><br><br>
      <input id="aEmail" placeholder="Email optional"><br><br>
      <textarea id="aNotes" placeholder="Notes optional"></textarea><br><br>
      <button id="addBtn" class="primary">STAGE LEAD</button>
    </div>
  </section>
  
</main>
<nav class="bottomNavSimple">
  <button class="nav active" data-p="leads">LEADS</button>
  <button class="nav navPlus" data-p="add" aria-label="Add lead">+</button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDocs,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJsXTmWdeUEFrC60nt4a02PCyMKB-pY_M",
  authDomain: "astonity-command-center.firebaseapp.com",
  projectId: "astonity-command-center",
  storageBucket: "astonity-command-center.firebasestorage.app",
  messagingSenderId: "708311828481",
  appId: "1:708311828481:web:6ba7128189da060c311800",
  measurementId: "G-5TE3M5RS9X"
};

const FIRESTORE_COLLECTION = "leads";
const LOCAL_BACKUP_KEY = "astonity-firebase-leads-backup";

const STATUSES = ["NEW LEAD","ENGAGED","FIRST DM","FOLLOW UP 1","FOLLOW UP 2","REPLIED","CLOSED","NOT INTERESTED","DEAD"];
const PRIORITIES = ["NEW LEAD","HIGH","MEDIUM","LOW","DEAD"];
const CATEGORIES = ["Contractor","Beauty / Aesthetics","Real Estate","Fitness","Dentist","Salon","Coach","Restaurant","Retail","Other"];
const PC = {"NEW LEAD":"#00d4ff",HIGH:"#22c55e",MEDIUM:"#facc15",LOW:"#ef4444",DEAD:"#36454f"};

let app = null;
let db = null;
let firebaseReady = false;
let leads = [];
let unsub = null;

const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const esc = (v) => String(v || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const toast = (m) => {
  const t = $("#toast");
  if (!t) return;
  t.textContent = m;
  t.style.display = "block";
  clearTimeout(toast._x);
  toast._x = setTimeout(() => t.style.display = "none", 1200);
};
const norm = (v) => {
  const c = String(v || "").trim().replace(/^@/, "");
  return c ? "@" + c : "";
};
const user = (v) => norm(v).replace("@", "");
const initText = (v) => {
  v = String(v || "").replace("@", "").trim();
  return (v.slice(0, 2) || "AX").toUpperCase();
};
const dt = (v) => {
  const d = new Date(v);
  return isNaN(d) ? new Date() : d;
};
const sd = (v) => {
  if (!v) return "None";
  return dt(v).toLocaleDateString("en-US", { month: "short", day: "numeric" });
};
const now = () => new Date().toISOString();
const opts = (arr, selected) => arr.map(x => `<option value="${esc(x)}" ${x === selected ? "selected" : ""}>${esc(x)}</option>`).join("");

function phoneSvg() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.8 19.8 0 0 1 11.19 19a19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.77.63 2.6a2 2 0 0 1-.45 2.11L8 9.67a16 16 0 0 0 6.33 6.33l1.24-1.24a2 2 0 0 1 2.11-.45c.83.3 1.7.51 2.6.63A2 2 0 0 1 22 16.92z"/></svg>';
}
function mailSvg() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="m22 6-10 7L2 6"/></svg>';
}

function defaultNextAction(lead) {
  if (["CLOSED", "NOT INTERESTED", "DEAD"].includes(lead.status)) return "";
  const base = dt(lead.lastContact || lead.dateAdded || now());
  const offsets = {"NEW LEAD":0,"ENGAGED":1,"FIRST DM":5,"FOLLOW UP 1":7,"FOLLOW UP 2":7,"REPLIED":0};
  if (!(lead.status in offsets)) return "";
  base.setDate(base.getDate() + offsets[lead.status]);
  return base.toISOString();
}

function normalizeLead(x) {
  const lead = {
    id: String(x.id || "").trim() || ("LEAD-" + Date.now() + "-" + Math.floor(Math.random() * 9999)),
    dateAdded: x.dateAdded || now(),
    igHandle: norm(x.igHandle || x.handle || ""),
    business: x.business || "No business name",
    category: x.category || "Other",
    phone: x.phone || "",
    email: x.email || "",
    status: x.status || "NEW LEAD",
    priority: x.priority || "NEW LEAD",
    notes: x.notes || "",
    lastContact: x.lastContact || x.dateAdded || now(),
    nextAction: x.nextAction || "",
    source: x.source || "CRM",
    owner: x.owner || "Flo",
    updatedAt: x.updatedAt || now()
  };
  lead.nextAction = lead.nextAction || defaultNextAction(lead);
  return lead;
}

function prepareLeadForSave(lead) {
  const clean = normalizeLead(lead);
  clean.updatedAt = now();
  clean.nextAction = defaultNextAction(clean);
  return clean;
}

function saveBackup() {
  localStorage.setItem(LOCAL_BACKUP_KEY, JSON.stringify(leads));
}

function loadBackup() {
  try {
    return JSON.parse(localStorage.getItem(LOCAL_BACKUP_KEY) || "[]").map(normalizeLead);
  } catch {
    return [];
  }
}

function filtered() {
  const q = ($("#search")?.value || "").toLowerCase().trim();
  const s = $("#fStatus")?.value || "All Status";
  const p = $("#fPriority")?.value || "All Priority";
  const c = $("#fCategory")?.value || "All Categories";
  return leads.filter(l =>
    (!q || [l.igHandle, l.business, l.category, l.phone, l.email, l.notes].join(" ").toLowerCase().includes(q)) &&
    (s === "All Status" || l.status === s) &&
    (p === "All Priority" || l.priority === p) &&
    (c === "All Categories" || l.category === c)
  );
}

function card(l) {
  const u = user(l.igHandle);
  const ne = l.nextAction || defaultNextAction(l);
  const no = !String(l.notes || "").trim();
  return `<article class="leadCard" data-id="${esc(l.id)}" style="border-left-color:${PC[l.priority] || "#00d4ff"};--lead-glow:${PC[l.priority] || "#00d4ff"}">
    <div class="leadTop">
      <div class="avatar">${initText(l.igHandle || l.business)}</div>
      <div class="identity">
        <div class="handle">${esc(l.igHandle || "@unknown")}</div>
        <div class="business">${esc(l.business)} · ${esc(l.category)}</div>
        <div class="contactIcons">
          <a class="contactIcon ${l.phone ? "" : "disabled"}" href="${l.phone ? "tel:" + esc(l.phone) : "#"}">${phoneSvg()}</a>
          <a class="contactIcon ${l.email ? "" : "disabled"}" href="${l.email ? "mailto:" + esc(l.email) : "#"}">${mailSvg()}</a>
        </div>
      </div>
      <div class="igActions">
        <button class="miniBtn copyBtn" data-copy="${esc(u)}">COPY IG</button>
        <a class="openBtn" href="https://instagram.com/${esc(u)}" target="_blank">OPEN IG</a>
      </div>
    </div>
    <div class="divider"></div>
    <div class="controlRow">
      <div class="inline">
        <select class="pill statusSelect" data-v="${esc(l.status)}">${opts(STATUSES, l.status)}</select>
        <select class="pill prioritySelect" data-v="${esc(l.priority)}">${opts(PRIORITIES, l.priority)}</select>
      </div>
      <div class="lastContact"><span>Last: ${sd(l.lastContact)}</span><span class="nextDate">Next: ${ne ? sd(ne) : "None"}</span></div>
    </div>
    <div class="notesWrap ${no ? "emptyNote" : ""}">
      <div class="notesHeader"><span>NOTES</span><button class="editNoteBtn">EDIT</button></div>
      <textarea class="notes">${esc(l.notes)}</textarea>
    </div>
    <button class="showNotesBtn ${no ? "" : "hidden"}">Notes</button>
    <div class="expanded">
      <div class="expandedTitle">LEAD DETAILS</div>
      <div class="expandedGrid">
        <div class="expandedField"><label>BUSINESS</label><input class="expBusiness" value="${esc(l.business)}"></div>
        <div class="expandedField"><label>IG HANDLE</label><input class="expHandle" value="${esc(u)}"></div>
        <div class="expandedField"><label>CATEGORY</label><select class="expCategory">${opts(CATEGORIES, l.category)}</select></div>
        <div class="expandedField"><label>PHONE</label><input class="expPhone" value="${esc(l.phone)}"></div>
        <div class="expandedField"><label>EMAIL</label><input class="expEmail" value="${esc(l.email)}"></div>
        <div class="expandedField"><label>STATUS</label><select class="expStatus">${opts(STATUSES, l.status)}</select></div>
        <div class="expandedField"><label>PRIORITY</label><select class="expPriority">${opts(PRIORITIES, l.priority)}</select></div>
        <div class="expandedField"><label>NOTES</label><textarea class="expNotes">${esc(l.notes)}</textarea></div>
      </div>
      <button class="collapse">COLLAPSE</button>
    </div>
  </article>`;
}

function render() {
  const list = filtered();
  $("#count").textContent = leads.length;
  $("#visible").textContent = list.length;
  $("#total").textContent = leads.length;
  $("#high").textContent = leads.filter(l => l.priority === "HIGH").length;
  $("#replied").textContent = leads.filter(l => ["REPLIED", "ENGAGED", "CLOSED"].includes(l.status)).length;
  $("#active").textContent = leads.filter(l => !["CLOSED", "NOT INTERESTED", "DEAD"].includes(l.status)).length;
  $("#leadList").innerHTML = list.length ? list.map(card).join("") : '<div class="empty">No leads found.</div>';
  bind();
}

async function refreshFromFirestore(showToast = false) {
  if (!firebaseReady || !db) {
    leads = loadBackup();
    render();
    $("#syncText").textContent = "Backup mode";
    if (showToast) toast("Loaded backup");
    return;
  }
  try {
    $("#syncText").textContent = "Loading...";
    const snap = await getDocs(query(collection(db, FIRESTORE_COLLECTION), orderBy("updatedAt", "desc")));
    leads = snap.docs.map(d => normalizeLead(d.data()));
    saveBackup();
    render();
    $("#syncText").textContent = "Live";
    if (showToast) toast("Synced");
  } catch (e) {
    console.error(e);
    leads = loadBackup();
    render();
    $("#syncText").textContent = "Backup mode";
    if (showToast) toast("Firebase failed, using backup");
  }
}

async function writeLead(lead) {
  const clean = prepareLeadForSave(lead);
  const idx = leads.findIndex(x => String(x.id) === String(clean.id));
  if (idx >= 0) leads[idx] = clean; else leads.unshift(clean);
  saveBackup();
  render();

  if (!firebaseReady || !db) {
    $("#syncText").textContent = "Backup mode";
    return;
  }

  try {
    await setDoc(doc(db, FIRESTORE_COLLECTION, clean.id), clean, { merge: true });
    $("#syncText").textContent = "Live";
  } catch (e) {
    console.error(e);
    $("#syncText").textContent = "Backup mode";
    toast("Saved to backup");
  }
}

function bind() {
  $$(".copyBtn").forEach(b => b.onclick = () => {
    navigator.clipboard?.writeText(b.dataset.copy);
    toast("IG copied");
  });

  $$(".showNotesBtn").forEach(b => b.onclick = () => {
    const card = b.closest(".leadCard");
    $(".notesWrap", card)?.classList.remove("emptyNote");
    b.classList.add("hidden");
  });

  $$(".leadCard").forEach(card => {
    const id = card.dataset.id;
    const lead = leads.find(x => String(x.id) === String(id));
    if (!lead) return;

    const avatar = $(".avatar", card);
    const collapse = $(".collapse", card);
    if (avatar) avatar.onclick = () => card.classList.toggle("open");
    if (collapse) collapse.onclick = () => card.classList.remove("open");

    const updateField = (key, value, rerender = false) => {
      lead[key] = value;
      if (key !== "lastContact" && key !== "dateAdded") lead.lastContact = now();
      writeLead(lead);
      if (rerender) render();
    };

    const statusSelect = $(".statusSelect", card);
    const prioritySelect = $(".prioritySelect", card);
    const notes = $(".notes", card);

    if (statusSelect) statusSelect.onchange = e => updateField("status", e.target.value, true);
    if (prioritySelect) prioritySelect.onchange = e => updateField("priority", e.target.value, true);
    if (notes) notes.oninput = e => updateField("notes", e.target.value, false);

    const bindField = (sel, key, transform = null, rerender = false) => {
      const el = $(sel, card);
      if (!el) return;
      const fn = transform || (v => v);
      el.oninput = e => updateField(key, fn(e.target.value), false);
      el.onchange = e => updateField(key, fn(e.target.value), rerender);
    };

    bindField(".expBusiness", "business");
    bindField(".expHandle", "igHandle", v => norm(v));
    bindField(".expCategory", "category", null, true);
    bindField(".expPhone", "phone");
    bindField(".expEmail", "email");
    bindField(".expNotes", "notes");
    bindField(".expStatus", "status", null, true);
    bindField(".expPriority", "priority", null, true);
  });
}

function splitLine(line) {
  let out = [], cur = "", q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i], n = line[i + 1];
    if (ch === '"' && q && n === '"') { cur += '"'; i++; continue; }
    if (ch === '"') { q = !q; continue; }
    if ((ch === "," || ch === "	") && !q) { out.push(cur.trim()); cur = ""; continue; }
    cur += ch;
  }
  out.push(cur.trim());
  return out;
}

function mapHead(arr) {
  const m = {};
  arr.forEach((x, i) => {
    const k = String(x || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    if (["business","businessname","company","companyname","name"].includes(k)) m.business = i;
    else if (["ighandle","instagram","instagramhandle","ig","handle","username","profile"].includes(k)) m.ig = i;
    else if (["category","industry","niche","type"].includes(k)) m.category = i;
    else if (["phone","phonenumber","tel","telephone","number"].includes(k)) m.phone = i;
    else if (["email","emailaddress","e-mail"].includes(k)) m.email = i;
    else if (["notes","note","description","details"].includes(k)) m.notes = i;
  });
  return m;
}

function parseRows(text) {
  const lines = String(text || "").replaceAll("", "").split("
").map(x => x.trim()).filter(Boolean);
  if (!lines.length) return [];
  const head = splitLine(lines[0]);
  let m = mapHead(head);
  const hasMapped = m.business !== undefined || m.ig !== undefined || m.category !== undefined;
  const start = hasMapped ? 1 : 0;
  if (!hasMapped) m = { business: 0, ig: 1, category: 2, phone: 3, email: 4, notes: 5 };

  const seen = new Set();
  return lines.slice(start).map(line => {
    const c = splitLine(line);
    const lead = {
      business: c[m.business] || "",
      igHandle: norm(c[m.ig] || ""),
      category: c[m.category] || "Other",
      phone: c[m.phone] || "",
      email: c[m.email] || "",
      notes: c[m.notes] || ""
    };
    const err = [];
    if (!lead.business) err.push("Missing business");
    if (!lead.igHandle) err.push("Missing IG");
    if (!lead.category) err.push("Missing category");
    const handleKey = lead.igHandle.toLowerCase();
    if (handleKey && seen.has(handleKey)) err.push("Duplicate in import");
    seen.add(handleKey);
    return { ...lead, _errors: err };
  });
}

async function addImported(rows) {
  const good = (rows || []).filter(r => !r._errors.length);
  if (!good.length) return toast("No valid leads");
  const creates = good.map(r => writeLead({
    id: "LEAD-" + Date.now() + "-" + Math.floor(Math.random() * 99999),
    dateAdded: now(),
    igHandle: r.igHandle,
    business: r.business,
    category: r.category,
    phone: r.phone,
    email: r.email,
    status: "NEW LEAD",
    priority: "NEW LEAD",
    notes: r.notes,
    lastContact: now(),
    nextAction: "",
    source: "AI Import",
    owner: "Flo",
    updatedAt: now()
  }));
  await Promise.all(creates);
  if ($("#importSummary")) $("#importSummary").textContent = good.length + " leads added to CRM";
  if ($("#importInput")) $("#importInput").value = "";
  if ($("#importPreview")) $("#importPreview").innerHTML = "";
  switchPage("leads");
  toast(good.length + " leads added to CRM");
}

function previewImport() {
  const rows = parseRows($("#importInput").value);
  window._rows = rows;
  const good = rows.filter(r => !r._errors.length), bad = rows.length - good.length;
  $("#importSummary").textContent = `${good.length} ready · ${bad} need review`;
  $("#importPreview").innerHTML = rows.map(r => `<div class="importPreviewCard ${r._errors.length ? "importBad" : "importGood"}"><strong>${esc(r.business || "Missing business")} · ${esc(r.igHandle || "Missing IG")}</strong><span>${esc(r.category || "Missing category")} ${r.phone ? "· " + esc(r.phone) : ""} ${r.email ? "· " + esc(r.email) : ""}</span>${r._errors.length ? `<span style="color:#ef4444">Issues: ${esc(r._errors.join(", "))}</span>` : `<span style="color:#00d4ff">Ready</span>`}</div>`).join("") + `<div class="importActions"><button id="addReadyBtn" class="primary">ADD READY LEADS</button></div>`;
  const btn = $("#addReadyBtn");
  if (btn) btn.onclick = () => addImported(window._rows || []);
}

function importFile() {
  const f = $("#importFile").files[0];
  if (!f) return toast("Choose a file first");
  const name = (f.name || "").toLowerCase();
  if (name.endsWith(".xlsx") || name.endsWith(".xls")) return toast("Excel upload UI added. CSV works right now.");
  const reader = new FileReader();
  reader.onload = e => {
    $("#importInput").value = e.target.result || "";
    addImported(parseRows($("#importInput").value));
  };
  reader.readAsText(f);
}

function switchPage(p) {
  $$(".page").forEach(x => x.classList.remove("active"));
  $("#" + p)?.classList.add("active");
  $$(".nav").forEach(x => x.classList.toggle("active", x.dataset.p === p));
}

async function addLead() {
  const h = norm($("#aHandle").value);
  if (!h) return toast("IG handle required");
  await writeLead({
    id: "LEAD-" + Date.now(),
    dateAdded: now(),
    igHandle: h,
    business: $("#aBusiness").value || "No business name",
    category: $("#aCategory").value,
    phone: $("#aPhone").value,
    email: $("#aEmail").value,
    status: "NEW LEAD",
    priority: "NEW LEAD",
    notes: $("#aNotes").value,
    lastContact: now(),
    nextAction: "",
    source: "CRM",
    owner: "Flo",
    updatedAt: now()
  });
  ["aBusiness","aHandle","aPhone","aEmail","aNotes"].forEach(id => $("#"+id).value = "");
  switchPage("leads");
  toast("Lead added to CRM");
}

async function initFirebase() {
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    firebaseReady = true;
    $("#syncText").textContent = "Live";
    if (unsub) unsub();
    const coll = query(collection(db, FIRESTORE_COLLECTION), orderBy("updatedAt", "desc"));
    unsub = onSnapshot(coll, (snap) => {
      leads = snap.docs.map(d => normalizeLead(d.data()));
      saveBackup();
      render();
      $("#syncText").textContent = "Live";
    }, (err) => {
      console.error(err);
      firebaseReady = false;
      leads = loadBackup();
      render();
      $("#syncText").textContent = "Backup mode";
    });
  } catch (e) {
    console.error(e);
    firebaseReady = false;
    leads = loadBackup();
    render();
    $("#syncText").textContent = "Backup mode";
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  $("#fStatus").innerHTML = "<option>All Status</option>" + STATUSES.map(x => `<option>${x}</option>`).join("");
  $("#fPriority").innerHTML = "<option>All Priority</option>" + PRIORITIES.map(x => `<option>${x}</option>`).join("");
  $("#fCategory").innerHTML = "<option>All Categories</option>" + CATEGORIES.map(x => `<option>${x}</option>`).join("");
  $("#aCategory").innerHTML = opts(CATEGORIES, "Contractor");

  ["search","fStatus","fPriority","fCategory"].forEach(id => {
    $("#" + id).oninput = render;
    $("#" + id).onchange = render;
  });

  $$(".nav").forEach(b => b.onclick = () => switchPage(b.dataset.p));
  $("#syncBtn").onclick = () => refreshFromFirestore(true);
  $("#addBtn").onclick = addLead;
  $("#parseImportBtn").onclick = previewImport;
  $("#importFileBtn").onclick = importFile;

  const toggleBtn = $("#importToggleBtn");
  const importPanel = $("#importPanel");
  if (toggleBtn && importPanel) toggleBtn.onclick = () => importPanel.classList.toggle("open");

  leads = loadBackup();
  render();
  await initFirebase();
  if (!firebaseReady && !leads.length) {
    $("#syncText").textContent = "Backup mode";
  }
});
</script>
